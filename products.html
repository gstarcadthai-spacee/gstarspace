<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Gstar Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="workspace-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">G</div>
        <div>
          <strong>Gstar Workspace</strong>
          <span>Internal SaaS Platform</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="Main navigation">
        <a href="index.html">Dashboard</a>
        <a href="products.html" class="active">Products</a>
        <a href="marketing.html">Marketing</a>
        <a href="sales.html">Sales</a>
        <a href="support.html">Support</a>
        <a href="knowledge.html">Knowledge Base</a>
        <a href="ai.html">AI Assistant</a>
        <a href="management.html">Management</a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="hero glass-panel">
        <div class="hero-copy">
          <p class="eyebrow">Product Workspace</p>
          <h1>Product Portfolio</h1>
          <p>Explore the complete Gstar ecosystem.</p>
        </div>

        <div class="hero-search">
          <label for="productSearch">Search Products</label>
          <div class="search-box">
            <span>⌕</span>
            <input id="productSearch" type="search" placeholder="Search products..." autocomplete="off" />
          </div>
        </div>
      </section>

      <section class="directory-section">
        <div class="directory-header">
          <div>
            <p class="eyebrow">Product Directory</p>
            <h2>All Products</h2>
          </div>
        </div>

        <div class="filter-row" id="categoryFilters" aria-label="Product categories"></div>

        <div class="product-grid" id="productGrid"></div>

        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon">⌕</div>
          <h3>No products found</h3>
          <p>Try another keyword.</p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">✓ Copied</div>

  <script src="app.js"></script>
</body>
</html>
